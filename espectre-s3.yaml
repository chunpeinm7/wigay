# ESPectre - ESP32-S3 Configuration
# WiFi CSI-based motion detection with Home Assistant integration
#
# Made for ESPHome - https://github.com/francescopace/espectre
#
# Provisioning:
# - Via BLE: Use the ESPHome app or Home Assistant companion app
# - Via USB: Use ESPHome web tools (https://web.esphome.io)
# - Via WiFi: Connect to "ESPectre Fallback" AP and configure

esphome:
  name: espectre
  friendly_name: ESPectre
  min_version: 2024.11.0
  # Uncomment the next line if you have multiple ESPectre devices (adds MAC suffix to name)
  # name_add_mac_suffix: true
  project:
    name: francescopace.espectre
    version: "2.2.0"

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  cpu_frequency: 240MHz
  framework:
    type: esp-idf

# PSRAM support (8MB on most S3 boards)
psram:
  mode: octal
  speed: 80MHz

# Load ESPectre component from local directory
external_components:
  - source:
      type: local
      path: components
    components: [ espectre ]

# ESPectre - WiFi CSI Motion Detection
espectre:
  id: espectre_csi
  traffic_generator_rate: 20

# Dashboard import for easy adoption
dashboard_import:
  package_import_url: github://francescopace/espectre/examples/espectre-s3.yaml@main
  import_full_config: true

# WiFi with fallback AP for provisioning
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  
  # Fallback AP (if unable to connect to main WiFi)
  ap:
    ssid: "ESPectre Fallback"
    password: "espectre123"

captive_portal:

# Improv provisioning via BLE
esp32_improv:
  authorizer: none

# Improv provisioning via USB
improv_serial:

# Logging
logger:
  level: DEBUG
  baud_rate: 115200

# Home Assistant API
api:
  # encryption:
  #   key: !secret api_encryption_key

# OTA updates
ota:
  - platform: esphome
    password: !secret ota_password

# Web Server (Optional - provides standalone web interface)
# Note: auth disabled to allow EventSource/CORS connections from monitor HTML
web_server:
  port: 80
  version: 3
  # auth:
  #   username: !secret web_username
  #   password: !secret web_password

# Status LED (if board has LED)
status_led:
  pin:
    number: GPIO48  # ESP32-S3 DevKit onboard LED
    inverted: false

# Text Sensors - Device information
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP 位址"
      id: ip_address_sensor
      icon: mdi:ip-network
    ssid:
      name: "已連接 WiFi"
      id: connected_wifi_sensor
      icon: mdi:wifi
    mac_address:
      name: "MAC 位址"
      id: mac_address_sensor
      icon: mdi:ethernet
  
  - platform: version
    name: "ESPHome 版本"
    id: esphome_version_sensor
    icon: mdi:information-outline

# Sensors - System monitoring
sensor:
  - platform: uptime
    name: "運行時間 Uptime"
    id: uptime_sensor
    update_interval: 60s
    icon: mdi:timer-outline
  
  - platform: wifi_signal
    name: "WiFi 訊號強度"
    id: wifi_signal_sensor
    update_interval: 60s
    icon: mdi:wifi-strength-3
  
  - platform: internal_temperature
    name: "晶片溫度 Temp"
    id: internal_temp_sensor
    update_interval: 60s
    icon: mdi:thermometer

# Buttons - System control
button:
  - platform: restart
    name: "重新啟動"
    id: restart_button
    icon: mdi:restart
  
  - platform: safe_mode
    name: "安全模式重啟"
    id: safe_mode_button
    icon: mdi:restart-alert

# Switches - Enable/disable features
switch:
  - platform: template
    name: "啟用動作偵測"
    id: motion_detection_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    icon: mdi:motion-sensor
