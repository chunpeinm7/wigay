<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wi-Care Home Automation v2.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2196F3;
            --success: #4CAF50;
            --warning: #FFC107;
            --danger: #f44336;
            --dark: #1a1a2e;
            --card: #16213e;
            --text: #ffffff;
            --text-secondary: #b0b0b0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--primary), var(--warning));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .version {
            color: var(--warning);
            font-size: 0.9em;
            margin-top: 5px;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 0.9em;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.connected { background: var(--success); }
        .status-dot.disconnected { background: var(--danger); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 導航標籤 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding: 10px 0;
        }

        .tab {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            font-size: 1em;
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .tab.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 卡片網格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .card-title {
            font-size: 1.4em;
            font-weight: 600;
        }

        .btn {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #1976D2;
            transform: scale(1.05);
        }

        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn-warning { background: var(--warning); }
        .btn-small { padding: 6px 12px; font-size: 0.85em; }

        /* 實體列表 */
        .entity-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .entity-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            transition: all 0.3s;
        }

        .entity-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .entity-info {
            flex: 1;
        }

        .entity-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .entity-id {
            font-size: 0.85em;
            color: var(--text-secondary);
        }

        .entity-state {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .state-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .state-on {
            background: var(--success);
            color: white;
        }

        .state-off {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
        }

        /* 自動化項目 */
        .automation-item, .scene-item {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .item-title {
            font-weight: 600;
            font-size: 1.1em;
        }

        .item-description {
            color: var(--text-secondary);
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .item-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 24px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: var(--success);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: white;
            top: 3px;
            left: 3px;
            transition: left 0.3s;
        }

        .toggle-switch.active::after {
            left: 29px;
        }

        /* 表單 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text);
            font-size: 1em;
        }

        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* 模態框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--card);
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.5em;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5em;
            cursor: pointer;
        }

        /* 圖表容器 */
        #chartContainer {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        /* 通知 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            background: var(--card);
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 2000;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* 載入動畫 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.8em;
            }

            .tabs {
                gap: 5px;
            }

            .tab {
                padding: 10px 16px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏠 Wi-Care 智能家居系統</h1>
            <div class="version">v2.0 - 完整功能版</div>
            <div class="status-bar">
                <div class="status-item">
                    <span class="status-dot" id="wsStatus"></span>
                    <span>WebSocket: <span id="wsStatusText">連接中...</span></span>
                </div>
                <div class="status-item">
                    <span class="status-dot" id="sseStatus"></span>
                    <span>SSE: <span id="sseStatusText">連接中...</span></span>
                </div>
                <div class="status-item">
                    <span>實體: <span id="entityCount">0</span></span>
                </div>
                <div class="status-item">
                    <span>自動化: <span id="automationCount">0</span></span>
                </div>
                <div class="status-item">
                    <span>場景: <span id="sceneCount">0</span></span>
                </div>
            </div>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('overview')">📊 總覽</button>
            <button class="tab" onclick="switchTab('entities')">🔌 實體</button>
            <button class="tab" onclick="switchTab('automations')">🤖 自動化</button>
            <button class="tab" onclick="switchTab('scenes')">🎬 場景</button>
            <button class="tab" onclick="switchTab('history')">📈 歷史</button>
            <button class="tab" onclick="switchTab('system')">⚙️ 系統</button>
        </div>

        <!-- 總覽標籤 -->
        <div id="overview" class="tab-content active">
            <div class="grid">
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">🔌 開關控制</h2>
                        <button class="btn btn-small" onclick="refreshEntities()">🔄</button>
                    </div>
                    <div id="switchList" class="entity-list"></div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">📊 感測器</h2>
                        <button class="btn btn-small" onclick="refreshEntities()">🔄</button>
                    </div>
                    <div id="sensorList" class="entity-list"></div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">🎬 快速場景</h2>
                        <button class="btn btn-small" onclick="switchTab('scenes')">管理</button>
                    </div>
                    <div id="quickScenes" class="entity-list"></div>
                </div>
            </div>
        </div>

        <!-- 實體標籤 -->
        <div id="entities" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">所有實體</h2>
                    <button class="btn" onclick="showCreateEntityModal()">➕ 新增實體</button>
                </div>
                <div id="allEntities" class="entity-list"></div>
            </div>
        </div>

        <!-- 自動化標籤 -->
        <div id="automations" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">自動化規則</h2>
                    <button class="btn" onclick="showCreateAutomationModal()">➕ 新增自動化</button>
                </div>
                <div id="automationList"></div>
            </div>
        </div>

        <!-- 場景標籤 -->
        <div id="scenes" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">場景管理</h2>
                    <button class="btn" onclick="showCreateSceneModal()">➕ 新增場景</button>
                </div>
                <div id="sceneList"></div>
            </div>
        </div>

        <!-- 歷史標籤 -->
        <div id="history" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">歷史數據</h2>
                    <div>
                        <select id="historyEntity" class="form-select" style="width: 200px;" onchange="loadHistory()">
                            <option value="">選擇實體...</option>
                        </select>
                    </div>
                </div>
                <div id="historyChart"></div>
                <div id="historyData"></div>
            </div>
        </div>

        <!-- 系統標籤 -->
        <div id="system" class="tab-content">
            <div class="grid">
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">💻 系統資訊</h2>
                        <button class="btn btn-small" onclick="loadSystemInfo()">🔄</button>
                    </div>
                    <div id="systemInfo"></div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">📝 事件日誌</h2>
                        <button class="btn btn-small btn-danger" onclick="clearLogs()">清除</button>
                    </div>
                    <div id="logContainer" style="max-height: 400px; overflow-y: auto;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 模態框 -->
    <div id="createEntityModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">新增實體</h3>
                <button class="close-btn" onclick="closeModal('createEntityModal')">&times;</button>
            </div>
            <form id="createEntityForm" onsubmit="createEntity(event)">
                <div class="form-group">
                    <label class="form-label">實體 ID</label>
                    <input type="text" class="form-input" name="entity_id" placeholder="例如: light.living_room" required>
                </div>
                <div class="form-group">
                    <label class="form-label">友好名稱</label>
                    <input type="text" class="form-input" name="friendly_name" placeholder="例如: 客廳燈" required>
                </div>
                <div class="form-group">
                    <label class="form-label">初始狀態</label>
                    <input type="text" class="form-input" name="state" value="off" required>
                </div>
                <button type="submit" class="btn">創建</button>
            </form>
        </div>
    </div>

    <div id="createAutomationModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">新增自動化</h3>
                <button class="close-btn" onclick="closeModal('createAutomationModal')">&times;</button>
            </div>
            <form id="createAutomationForm" onsubmit="createAutomation(event)">
                <div class="form-group">
                    <label class="form-label">名稱</label>
                    <input type="text" class="form-input" name="name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">描述</label>
                    <textarea class="form-textarea" name="description"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">觸發器 JSON</label>
                    <textarea class="form-textarea" name="triggers" placeholder='[{"platform": "time", "at": "18:00:00"}]' required></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">動作 JSON</label>
                    <textarea class="form-textarea" name="actions" placeholder='[{"service": "turn_on", "entity_id": "switch.gpio_2"}]' required></textarea>
                </div>
                <button type="submit" class="btn">創建</button>
            </form>
        </div>
    </div>

    <div id="createSceneModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">新增場景</h3>
                <button class="close-btn" onclick="closeModal('createSceneModal')">&times;</button>
            </div>
            <form id="createSceneForm" onsubmit="createScene(event)">
                <div class="form-group">
                    <label class="form-label">場景名稱</label>
                    <input type="text" class="form-input" name="name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">描述</label>
                    <textarea class="form-textarea" name="description"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">實體設定 JSON</label>
                    <textarea class="form-textarea" name="entities" placeholder='[{"entity_id": "switch.gpio_2", "state": "on"}]' required></textarea>
                </div>
                <button type="submit" class="btn">創建</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
