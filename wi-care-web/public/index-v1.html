<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wi-Care Home Automation System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2196F3;
            --secondary-color: #FFC107;
            --success-color: #4CAF50;
            --danger-color: #f44336;
            --dark-bg: #1a1a2e;
            --card-bg: #16213e;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 0.9em;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.connected { background: var(--success-color); }
        .status-dot.disconnected { background: var(--danger-color); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .card-title {
            font-size: 1.4em;
            font-weight: 600;
        }

        .gpio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
        }

        .gpio-button {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
            text-align: center;
        }

        .gpio-button:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .gpio-button.active {
            background: var(--success-color);
            border-color: var(--success-color);
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }

        .sensor-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border-left: 4px solid var(--primary-color);
        }

        .sensor-label {
            font-size: 1em;
            color: var(--text-secondary);
        }

        .sensor-value {
            font-size: 1.3em;
            font-weight: 600;
            color: var(--primary-color);
        }

        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .control-label {
            min-width: 100px;
            font-weight: 500;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(33, 150, 243, 0.5);
        }

        button {
            padding: 12px 24px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #1976D2;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .system-info {
            font-size: 0.9em;
            line-height: 1.8;
        }

        .system-info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .memory-bar {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .memory-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success-color), var(--secondary-color));
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
        }

        .log-container {
            max-height: 300px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-time {
            color: var(--secondary-color);
            margin-right: 10px;
        }

        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: var(--primary-color);
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .status-bar {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏠 Wi-Care 智能家居系統</h1>
            <div class="status-bar">
                <div class="status-indicator">
                    <span class="status-dot" id="wsStatus"></span>
                    <span>WebSocket: <span id="wsStatusText">連接中...</span></span>
                </div>
                <div class="status-indicator">
                    <span class="status-dot" id="sseStatus"></span>
                    <span>SSE: <span id="sseStatusText">連接中...</span></span>
                </div>
                <div class="status-indicator">
                    <span>運行時間: <span id="uptime">--</span></span>
                </div>
            </div>
        </header>

        <div class="grid">
            <!-- GPIO 控制卡片 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">🔌 GPIO 控制</h2>
                    <button onclick="refreshGPIO()">🔄 刷新</button>
                </div>
                <div class="gpio-grid" id="gpioGrid"></div>
            </div>

            <!-- 感測器數據卡片 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">📊 感測器數據</h2>
                    <button onclick="refreshSensors()">🔄 刷新</button>
                </div>
                <div id="sensorData">
                    <div class="sensor-item">
                        <span class="sensor-label">🌡️ 溫度</span>
                        <span class="sensor-value" id="temperature">--°C</span>
                    </div>
                    <div class="sensor-item">
                        <span class="sensor-label">💧 濕度</span>
                        <span class="sensor-value" id="humidity">--%</span>
                    </div>
                    <div class="sensor-item">
                        <span class="sensor-label">🌪️ 氣壓</span>
                        <span class="sensor-value" id="pressure">-- hPa</span>
                    </div>
                    <div class="sensor-item">
                        <span class="sensor-label">💡 光線</span>
                        <span class="sensor-value" id="light">--</span>
                    </div>
                    <div class="sensor-item">
                        <span class="sensor-label">🚶 動作偵測</span>
                        <span class="sensor-value" id="motion">--</span>
                    </div>
                </div>
            </div>

            <!-- PWM 控制卡片 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">⚡ PWM 控制</h2>
                </div>
                <div class="control-panel">
                    <div class="control-group">
                        <span class="control-label">針腳 5:</span>
                        <input type="range" min="0" max="255" value="0" id="pwm5" onchange="setPWM(5, this.value)">
                        <span id="pwm5Value">0</span>
                    </div>
                    <div class="control-group">
                        <span class="control-label">針腳 18:</span>
                        <input type="range" min="0" max="255" value="0" id="pwm18" onchange="setPWM(18, this.value)">
                        <span id="pwm18Value">0</span>
                    </div>
                    <div class="control-group">
                        <span class="control-label">針腳 19:</span>
                        <input type="range" min="0" max="255" value="0" id="pwm19" onchange="setPWM(19, this.value)">
                        <span id="pwm19Value">0</span>
                    </div>
                </div>
            </div>

            <!-- 系統資訊卡片 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">💻 系統資訊</h2>
                    <button onclick="refreshSystemInfo()">🔄 刷新</button>
                </div>
                <div class="system-info" id="systemInfo">
                    <div class="system-info-item">
                        <span>主機名稱:</span>
                        <span id="hostname">--</span>
                    </div>
                    <div class="system-info-item">
                        <span>平台:</span>
                        <span id="platform">--</span>
                    </div>
                    <div class="system-info-item">
                        <span>架構:</span>
                        <span id="arch">--</span>
                    </div>
                    <div class="system-info-item">
                        <span>CPU 核心:</span>
                        <span id="cpus">--</span>
                    </div>
                    <div style="margin-top: 15px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                            <span>記憶體使用:</span>
                            <span id="memoryPercentage">--%</span>
                        </div>
                        <div class="memory-bar">
                            <div class="memory-fill" id="memoryFill" style="width: 0%">
                                <span id="memoryText"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 事件日誌卡片 -->
            <div class="card" style="grid-column: 1 / -1;">
                <div class="card-header">
                    <h2 class="card-title">📝 事件日誌</h2>
                    <button onclick="clearLogs()">🗑️ 清除</button>
                </div>
                <div class="log-container" id="logContainer"></div>
            </div>
        </div>
    </div>

    <script>
        // WebSocket 連接
        let ws = null;
        let eventSource = null;
        const logs = [];

        // 初始化連接
        function initConnections() {
            // WebSocket 連接
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${wsProtocol}//${window.location.host}`;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                updateConnectionStatus('ws', true);
                addLog('WebSocket 連接成功');
            };
            
            ws.onclose = () => {
                updateConnectionStatus('ws', false);
                addLog('WebSocket 連接已斷開');
                setTimeout(initConnections, 3000);
            };
            
            ws.onerror = (error) => {
                addLog('WebSocket 錯誤: ' + error);
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleWebSocketMessage(data);
                } catch (error) {
                    console.error('解析 WebSocket 消息失敗:', error);
                }
            };

            // SSE 連接
            eventSource = new EventSource('/api/events');
            
            eventSource.onopen = () => {
                updateConnectionStatus('sse', true);
                addLog('SSE 連接成功');
            };
            
            eventSource.onerror = () => {
                updateConnectionStatus('sse', false);
                addLog('SSE 連接錯誤');
            };
            
            eventSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleSSEMessage(data);
                } catch (error) {
                    console.error('解析 SSE 消息失敗:', error);
                }
            };
        }

        // 處理 WebSocket 消息
        function handleWebSocketMessage(data) {
            switch (data.type) {
                case 'welcome':
                    addLog(data.message);
                    break;
                case 'status':
                    updateUIWithStatus(data.data);
                    break;
                case 'gpio':
                    updateGPIOButton(data.pin, data.value);
                    addLog(`GPIO ${data.pin} 狀態: ${data.value ? 'ON' : 'OFF'}`);
                    break;
                case 'sensorUpdate':
                    updateSensorData(data.data);
                    break;
                case 'pwm':
                    addLog(`PWM ${data.pin} 設定為: ${data.value}`);
                    break;
            }
        }

        // 處理 SSE 消息
        function handleSSEMessage(data) {
            if (data.type === 'status' && data.systemInfo) {
                updateSystemInfo(data.systemInfo);
                if (data.sensors) {
                    updateSensorData(data.sensors);
                }
            }
        }

        // 更新連接狀態
        function updateConnectionStatus(type, connected) {
            const dot = document.getElementById(`${type}Status`);
            const text = document.getElementById(`${type}StatusText`);
            
            if (connected) {
                dot.className = 'status-dot connected';
                text.textContent = '已連接';
            } else {
                dot.className = 'status-dot disconnected';
                text.textContent = '已斷開';
            }
        }

        // 初始化 GPIO 按鈕
        function initGPIOGrid() {
            const pins = [2, 4, 5, 12, 13, 14, 15, 16, 17, 18, 19, 21, 22, 23, 25, 26, 27];
            const grid = document.getElementById('gpioGrid');
            
            pins.forEach(pin => {
                const button = document.createElement('button');
                button.className = 'gpio-button';
                button.id = `gpio${pin}`;
                button.innerHTML = `PIN ${pin}<br><small>OFF</small>`;
                button.onclick = () => toggleGPIO(pin);
                grid.appendChild(button);
            });
        }

        // 切換 GPIO 狀態
        async function toggleGPIO(pin) {
            const button = document.getElementById(`gpio${pin}`);
            const isActive = button.classList.contains('active');
            const newState = !isActive;
            
            try {
                const response = await fetch(`/api/gpio/${pin}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Basic ' + btoa('admin:admin123')
                    },
                    body: JSON.stringify({ state: newState })
                });
                
                if (response.ok) {
                    updateGPIOButton(pin, newState);
                }
            } catch (error) {
                addLog(`控制 GPIO ${pin} 失敗: ${error.message}`);
            }
        }

        // 更新 GPIO 按鈕狀態
        function updateGPIOButton(pin, state) {
            const button = document.getElementById(`gpio${pin}`);
            if (button) {
                if (state) {
                    button.classList.add('active');
                    button.innerHTML = `PIN ${pin}<br><small>ON</small>`;
                } else {
                    button.classList.remove('active');
                    button.innerHTML = `PIN ${pin}<br><small>OFF</small>`;
                }
            }
        }

        // 設定 PWM
        async function setPWM(pin, value) {
            document.getElementById(`pwm${pin}Value`).textContent = value;
            
            try {
                const response = await fetch('/api/control', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Basic ' + btoa('admin:admin123')
                    },
                    body: JSON.stringify({
                        action: 'pwm',
                        pin: pin,
                        value: parseInt(value)
                    })
                });
                
                if (response.ok) {
                    addLog(`PWM ${pin} 設定為 ${value}`);
                }
            } catch (error) {
                addLog(`設定 PWM 失敗: ${error.message}`);
            }
        }

        // 更新感測器數據
        function updateSensorData(data) {
            document.getElementById('temperature').textContent = data.temperature + '°C';
            document.getElementById('humidity').textContent = data.humidity + '%';
            document.getElementById('pressure').textContent = data.pressure + ' hPa';
            document.getElementById('light').textContent = data.light;
            document.getElementById('motion').textContent = data.motion ? '偵測到' : '無';
        }

        // 更新系統資訊
        function updateSystemInfo(info) {
            document.getElementById('hostname').textContent = info.hostname || '--';
            document.getElementById('platform').textContent = info.platform || '--';
            document.getElementById('arch').textContent = info.arch || '--';
            document.getElementById('cpus').textContent = info.cpus || '--';
            document.getElementById('uptime').textContent = formatUptime(info.uptime);
            
            if (info.memory) {
                const percentage = parseFloat(info.memory.percentage);
                document.getElementById('memoryPercentage').textContent = percentage.toFixed(1) + '%';
                document.getElementById('memoryFill').style.width = percentage + '%';
                const usedGB = (info.memory.used / 1024 / 1024 / 1024).toFixed(2);
                const totalGB = (info.memory.total / 1024 / 1024 / 1024).toFixed(2);
                document.getElementById('memoryText').textContent = `${usedGB} / ${totalGB} GB`;
            }
        }

        // 格式化運行時間
        function formatUptime(seconds) {
            if (!seconds) return '--';
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            return `${days}天 ${hours}時 ${minutes}分`;
        }

        // 刷新功能
        async function refreshGPIO() {
            try {
                const response = await fetch('/api/gpio');
                const data = await response.json();
                Object.keys(data).forEach(pin => {
                    updateGPIOButton(parseInt(pin), data[pin].state);
                });
                addLog('已刷新 GPIO 狀態');
            } catch (error) {
                addLog('刷新 GPIO 失敗: ' + error.message);
            }
        }

        async function refreshSensors() {
            try {
                const response = await fetch('/api/sensors');
                const data = await response.json();
                updateSensorData(data);
                addLog('已刷新感測器數據');
            } catch (error) {
                addLog('刷新感測器失敗: ' + error.message);
            }
        }

        async function refreshSystemInfo() {
            try {
                const response = await fetch('/api/system');
                const data = await response.json();
                updateSystemInfo(data);
                addLog('已刷新系統資訊');
            } catch (error) {
                addLog('刷新系統資訊失敗: ' + error.message);
            }
        }

        // 更新 UI 狀態
        function updateUIWithStatus(status) {
            if (status.gpioStates) {
                Object.keys(status.gpioStates).forEach(pin => {
                    updateGPIOButton(parseInt(pin), status.gpioStates[pin].state);
                });
            }
            if (status.sensors) {
                updateSensorData(status.sensors);
            }
        }

        // 日誌功能
        function addLog(message) {
            const now = new Date();
            const time = now.toLocaleTimeString('zh-TW');
            logs.unshift({ time, message });
            if (logs.length > 100) logs.pop();
            
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[${time}]</span>${message}`;
            container.insertBefore(entry, container.firstChild);
            
            if (container.children.length > 50) {
                container.removeChild(container.lastChild);
            }
        }

        function clearLogs() {
            logs.length = 0;
            document.getElementById('logContainer').innerHTML = '';
            addLog('日誌已清除');
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initGPIOGrid();
            initConnections();
            addLog('系統初始化完成');
            
            // 定期刷新數據
            setInterval(refreshSensors, 10000);
            setInterval(refreshSystemInfo, 5000);
        });
    </script>
</body>
</html>
