<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wi-Care Home Automation v2.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Dark theme (default) */
        :root {
            --primary: #2196F3;
            --success: #4CAF50;
            --warning: #FFC107;
            --danger: #f44336;
            --bg: #1a1a2e;
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --card: #16213e;
            --sidebar-bg: #0f1628;
            --text: #ffffff;
            --text-secondary: #b0b0b0;
            --overlay: rgba(255, 255, 255, 0.05);
            --overlay-hover: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* Light theme */
        [data-theme="light"] {
            --bg: #f0f2f5;
            --bg-gradient: linear-gradient(135deg, #f0f2f5 0%, #e4e7ec 100%);
            --card: #ffffff;
            --sidebar-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #555555;
            --overlay: rgba(0, 0, 0, 0.04);
            --overlay-hover: rgba(0, 0, 0, 0.08);
            --border: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }

        /* Left Sidebar - slide-out drawer */
        .sidebar {
            width: 220px;
            min-height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: -220px;
            z-index: 200;
            overflow-y: auto;
            transition: left 0.3s ease;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 150;
        }

        .sidebar-backdrop.open {
            display: block;
        }

        .sidebar-toggle {
            position: fixed;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            z-index: 120;
            width: 28px;
            height: 56px;
            background: var(--card);
            border: 1px solid var(--border);
            border-left: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 2px 0 8px rgba(0,0,0,0.1);
        }

        .sidebar-toggle:hover {
            width: 34px;
            background: var(--overlay-hover);
        }

        .sidebar-toggle .arrow {
            transition: transform 0.3s ease;
        }

        .sidebar-toggle.open .arrow {
            transform: rotate(180deg);
        }

        .sidebar-brand {
            padding: 24px 20px 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-brand h2 {
            font-size: 1.3em;
            color: var(--primary);
        }

        .sidebar-brand .version {
            color: var(--text-secondary);
            font-size: 0.8em;
            margin-top: 4px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 10px 0;
        }

        .nav-item {
            display: block;
            width: 100%;
            padding: 12px 24px;
            background: none;
            border: none;
            color: var(--text);
            text-align: left;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: var(--overlay-hover);
        }

        .nav-item.active {
            background: var(--overlay);
            border-left-color: var(--primary);
            color: var(--primary);
            font-weight: 600;
        }

        /* Main content area */
        .main-wrapper {
            flex: 1;
            min-height: 100vh;
        }

        /* Top bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--overlay);
            border-bottom: 1px solid var(--border);
        }

        .status-bar {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: var(--overlay);
            border-radius: 20px;
            font-size: 0.85em;
        }

        .theme-toggle {
            padding: 8px 16px;
            background: var(--overlay);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            background: var(--overlay-hover);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.connected { background: var(--success); }
        .status-dot.disconnected { background: var(--danger); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 卡片網格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s;
            border: 1px solid var(--border);
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border);
        }

        .card-title {
            font-size: 1.4em;
            font-weight: 600;
        }

        .btn {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #1976D2;
            transform: scale(1.05);
        }

        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn-warning { background: var(--warning); }
        .btn-small { padding: 6px 12px; font-size: 0.85em; }

        /* 實體列表 */
        .entity-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .entity-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--overlay);
            border-radius: 10px;
            transition: all 0.3s;
        }

        .entity-item:hover {
            background: var(--overlay-hover);
        }

        .entity-info {
            flex: 1;
        }

        .entity-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .entity-id {
            font-size: 0.85em;
            color: var(--text-secondary);
        }

        .entity-state {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .state-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .state-on {
            background: var(--success);
            color: white;
        }

        .state-off {
            background: var(--overlay);
            color: var(--text-secondary);
        }

        /* 自動化項目 */
        .automation-item, .scene-item {
            padding: 15px;
            background: var(--overlay);
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .item-title {
            font-weight: 600;
            font-size: 1.1em;
        }

        .item-description {
            color: var(--text-secondary);
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .item-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 24px;
            background: var(--overlay-hover);
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: var(--success);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: white;
            top: 3px;
            left: 3px;
            transition: left 0.3s;
        }

        .toggle-switch.active::after {
            left: 29px;
        }

        /* 表單 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px;
            background: var(--overlay);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1em;
        }

        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* 模態框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.5em;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5em;
            cursor: pointer;
        }

        /* 圖表容器 */
        #chartContainer {
            background: var(--overlay);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        /* 通知 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            background: var(--card);
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 2000;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* 載入動畫 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        
        /* 通知樣式 */
        .notification {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        /* 浮動按鈕 */
        .floating-action-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            z-index: 1000;
        }
        
        .floating-action-button:hover {
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 6px 30px rgba(0,0,0,0.5);
        }
        
        /* 快速操作面板 */
        .quick-action-panel {
            position: fixed;
            bottom: 100px;
            right: 30px;
            background: var(--card);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.4);
            min-width: 200px;
            z-index: 999;
            animation: fadeInUp 0.3s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .quick-action-item {
            padding: 12px;
            margin-bottom: 8px;
            background: var(--overlay);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quick-action-item:hover {
            background: var(--overlay-hover);
            transform: translateX(-5px);
        }
        
        /* 統計卡片 */
        .stat-card {
            padding: 25px;
            border-radius: 15px;
            color: white;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar Toggle Arrow -->
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">
        <span class="arrow">&#9654;</span>
    </button>

    <!-- Sidebar Backdrop -->
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>

    <!-- Left Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <h2>Wi-Care</h2>
            <div class="version">v2.0 - 智能家居系統</div>
        </div>
        <div class="sidebar-nav">
            <button class="nav-item active" onclick="switchTab('overview', this)">總覽</button>
            <button class="nav-item" onclick="switchTab('entities', this)">實體</button>
            <button class="nav-item" onclick="switchTab('automations', this)">自動化</button>
            <button class="nav-item" onclick="switchTab('scenes', this)">場景</button>
            <button class="nav-item" onclick="switchTab('groups', this)">群組</button>
            <button class="nav-item" onclick="switchTab('scripts', this)">腳本</button>
            <button class="nav-item" onclick="switchTab('helpers', this)">輔助</button>
            <button class="nav-item" onclick="switchTab('areas', this)">區域</button>
            <button class="nav-item" onclick="switchTab('history', this)">歷史</button>
            <button class="nav-item" onclick="switchTab('system', this)">系統</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-wrapper">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="status-bar">
                <div class="status-item">
                    <span class="status-dot" id="wsStatus"></span>
                    <span>WebSocket: <span id="wsStatusText">連接中...</span></span>
                </div>
                <div class="status-item">
                    <span class="status-dot" id="sseStatus"></span>
                    <span>SSE: <span id="sseStatusText">連接中...</span></span>
                </div>
                <div class="status-item">
                    <span>實體: <span id="entityCount">0</span></span>
                </div>
                <div class="status-item">
                    <span>自動化: <span id="automationCount">0</span></span>
                </div>
                <div class="status-item">
                    <span>場景: <span id="sceneCount">0</span></span>
                </div>
            </div>
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">切換亮色</button>
        </div>

        <div class="container">

        <!-- 總覽標籤 -->
        <div id="overview" class="tab-content active">
            <!-- 統計卡片區 -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
                <div class="stat-card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                    <div style="font-size: 2em; font-weight: 700;" id="statSwitchesOn">0</div>
                    <div style="opacity: 0.9;">開關已開啟</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                    <div style="font-size: 2em; font-weight: 700;" id="statSensors">0</div>
                    <div style="opacity: 0.9;">感測器</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                    <div style="font-size: 2em; font-weight: 700;" id="statAutomations">0</div>
                    <div style="opacity: 0.9;">自動化規則</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">
                    <div style="font-size: 2em; font-weight: 700;" id="statScenes">0</div>
                    <div style="opacity: 0.9;">場景</div>
                </div>
            </div>
            
            <div class="grid">
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">開關控制</h2>
                        <button class="btn btn-small" onclick="refreshEntities()">重整</button>
                    </div>
                    <div id="switchList" class="entity-list"></div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">感測器</h2>
                        <button class="btn btn-small" onclick="refreshEntities()">重整</button>
                    </div>
                    <div id="sensorList" class="entity-list"></div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">快速場景</h2>
                        <button class="btn btn-small" onclick="switchTab('scenes')">管理</button>
                    </div>
                    <div id="quickScenes" class="entity-list"></div>
                </div>
            </div>
        </div>

        <!-- 實體標籤 -->
        <div id="entities" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">所有實體</h2>
                    <button class="btn" onclick="showCreateEntityModal()">新增實體</button>
                </div>
                <div id="allEntities" class="entity-list"></div>
            </div>
        </div>

        <!-- 自動化標籤 -->
        <div id="automations" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">自動化規則</h2>
                    <button class="btn" onclick="showCreateAutomationModal()">新增自動化</button>
                </div>
                <div id="automationList"></div>
            </div>
        </div>

        <!-- 場景標籤 -->
        <div id="scenes" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">場景管理</h2>
                    <button class="btn" onclick="showCreateSceneModal()">新增場景</button>
                </div>
                <div id="sceneList"></div>
            </div>
        </div>

        <!-- 歷史標籤 -->
        <div id="history" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">歷史數據</h2>
                    <div>
                        <select id="historyEntity" class="form-select" style="width: 200px;" onchange="loadHistory()">
                            <option value="">選擇實體...</option>
                        </select>
                    </div>
                </div>
                <div id="historyChart"></div>
                <div id="historyData"></div>
            </div>
        </div>

        <!-- 群組標籤 -->
        <div id="groups" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">群組管理</h2>
                    <button class="btn" onclick="showCreateGroupModal()">新增群組</button>
                </div>
                <div id="groupList"></div>
            </div>
        </div>

        <!-- 腳本標籤 -->
        <div id="scripts" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">腳本管理</h2>
                    <button class="btn" onclick="showCreateScriptModal()">新增腳本</button>
                </div>
                <div id="scriptList"></div>
            </div>
        </div>

        <!-- 輸入助手標籤 -->
        <div id="helpers" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">輸入助手</h2>
                    <div>
                        <button class="btn btn-small" onclick="showCreateHelperModal('boolean')">Boolean</button>
                        <button class="btn btn-small" onclick="showCreateHelperModal('number')">Number</button>
                        <button class="btn btn-small" onclick="showCreateHelperModal('select')">Select</button>
                        <button class="btn btn-small" onclick="showCreateHelperModal('text')">Text</button>
                    </div>
                </div>
                <div id="helperList"></div>
            </div>
        </div>

        <!-- 區域標籤 -->
        <div id="areas" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">區域管理</h2>
                    <button class="btn" onclick="showCreateAreaModal()">新增區域</button>
                </div>
                <div id="areaList"></div>
            </div>
        </div>

        <!-- 系統標籤 -->
        <div id="system" class="tab-content">
            <div class="grid">
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">系統資訊</h2>

    <script>
    // Sidebar toggle
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const backdrop = document.getElementById('sidebarBackdrop');
        const toggle = document.getElementById('sidebarToggle');
        const isOpen = sidebar.classList.contains('open');
        sidebar.classList.toggle('open');
        backdrop.classList.toggle('open');
        toggle.classList.toggle('open');
    }

    // Theme toggle
    function toggleTheme() {
        const html = document.documentElement;
        const btn = document.getElementById('themeToggle');
        if (html.getAttribute('data-theme') === 'light') {
            html.removeAttribute('data-theme');
            btn.textContent = '切換亮色';
            localStorage.setItem('wi-care-theme', 'dark');
        } else {
            html.setAttribute('data-theme', 'light');
            btn.textContent = '切換暗色';
            localStorage.setItem('wi-care-theme', 'light');
        }
    }
    // Restore saved theme
    (function() {
        const saved = localStorage.getItem('wi-care-theme');
        if (saved === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.addEventListener('DOMContentLoaded', function() {
                document.getElementById('themeToggle').textContent = '切換暗色';
            });
        }
    })();
    </script>
    <script src="app.js"></script>
